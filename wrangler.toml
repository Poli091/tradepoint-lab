# TradePoint Lab — Cloudflare Worker configuration
# Docs: https://developers.cloudflare.com/workers/configuration/

name            = "tradepoint-worker"
main            = "worker/index.js"
compatibility_date = "2024-09-23"

# ── KV Namespace ──────────────────────────────────────────────
# SETUP STEPS:
# 1. Create the namespace:
#    npx wrangler kv:namespace create TRADEPOINT_KV
# 2. Copy the id from the output and paste it below.
# 3. For local dev also run:
#    npx wrangler kv:namespace create TRADEPOINT_KV --preview
#    and paste the preview_id below.

[[kv_namespaces]]
binding    = "TRADEPOINT_KV"
id         = "b6b9ac8b3fa84c45a396ab2b9f036b72"
# preview_id = "REPLACE_WITH_PREVIEW_ID"   # only needed for `wrangler dev`

# ── API Key Secrets ───────────────────────────────────────────
# Set these ONCE via wrangler CLI — they are never stored in this file.
# Run each command and paste the key when prompted:
#
#   npx wrangler secret put FINNHUB_KEY
#   npx wrangler secret put FMP_KEY
#   npx wrangler secret put ALPACA_KEY
#   npx wrangler secret put ALPACA_SECRET
#   npx wrangler secret put GROQ_KEY
#
# Alternatively set them in Cloudflare Dashboard:
#   Workers & Pages → tradepoint-worker → Settings → Variables → Secrets

# ── Optional: restrict CORS to your Pages domain ──────────────
# [vars]
# ALLOWED_ORIGIN = "https://tradepoint-lab.pages.dev"

# ── D1 Database ───────────────────────────────────────────────
# SETUP STEPS:
# 1. Create:  npx wrangler d1 create tradepoint-db
# 2. Paste the database_id below
# 3. Create tables: npx wrangler d1 execute tradepoint-db --file=worker/schema.sql
# 4. Deploy: npx wrangler deploy

[[d1_databases]]
binding         = "TRADEPOINT_DB"
database_name   = "tradepoint-db"
database_id     = "ba122b9c-4352-4ec5-8683-8a6999b44dfb"
migrations_dir  = "worker/migrations"  # Wrangler tracks applied migrations here

# ── Cron Trigger — Weekly Snapshots ──────────────────────────
# Runs every Sunday at 00:00 UTC
# Scans all tickers cached in KV and saves conviction scores to D1

[triggers]
crons = [
  "0 0 * * 0",    # Sunday 00:00 UTC — full weekly conviction snapshot
  "0 22 * * 1-5"  # Mon-Fri 22:00 UTC (6pm EDT / 5pm EST) — daily RS calculation, guaranteed post-close
]
